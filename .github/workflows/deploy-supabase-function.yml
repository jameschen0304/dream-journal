name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-function.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy openrouter-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::缺少 Secret：SUPABASE_ACCESS_TOKEN（在 Supabase 账号里创建 Access Token 后添加到本仓库 Actions Secrets）"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::缺少 Secret：SUPABASE_PROJECT_REF（Supabase 项目 Reference ID，与 *.supabase.co 子域名一致）"
            exit 1
          fi
          supabase functions deploy openrouter-proxy --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
