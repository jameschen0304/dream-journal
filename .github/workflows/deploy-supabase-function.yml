name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-function.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy openrouter-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::缺少 GitHub Secrets：请在仓库 Settings → Secrets 添加 SUPABASE_ACCESS_TOKEN 与 SUPABASE_PROJECT_REF"
            exit 1
          fi
          supabase functions deploy openrouter-proxy --project-ref "$SUPABASE_PROJECT_REF"
